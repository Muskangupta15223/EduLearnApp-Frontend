# ============================================================
# EduLearn LMS — Global Nginx Reverse Proxy
# ============================================================
# Place this file at /etc/nginx/sites-available/edulearn
# then: sudo ln -s /etc/nginx/sites-available/edulearn /etc/nginx/sites-enabled/
# Run Certbot AFTER this is in place:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ============================================================

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Certbot ACME challenge (required for SSL issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server Block ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL — managed by Certbot (do not remove these lines) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # ── Client / Proxy Timeouts ───────────────────────────────────────────────
    client_max_body_size    50M;
    proxy_connect_timeout   60s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # ── Rate Limiting Zone (define once, use on sensitive endpoints) ──────────
    # (zones are defined in /etc/nginx/nginx.conf http block)

    # ─────────────────────────────────────────────────────────────────────────
    # API Gateway — all /api/* and backend routes forwarded to Spring Gateway
    # ─────────────────────────────────────────────────────────────────────────
    location ~ ^/(auth|users|courses|modules|lessons|enrollments|payments|notifications|quizzes|assignments|attempts|questions|submissions|moderation|oauth2|login|actuator)(/|$) {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Spring Boot Admin (restrict to internal/VPN IPs in production)
    # ─────────────────────────────────────────────────────────────────────────
    location /admin/ {
        # SECURITY: Uncomment and set your IP to restrict access
        # allow  203.0.113.10;
        # deny   all;

        proxy_pass         http://127.0.0.1:9090/admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Eureka Dashboard (restrict to internal/VPN IPs in production)
    # ─────────────────────────────────────────────────────────────────────────
    location /eureka/ {
        # allow  203.0.113.10;
        # deny   all;

        proxy_pass         http://127.0.0.1:8761/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # React Frontend (SPA — all remaining routes served via Nginx)
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
            proxy_pass    http://127.0.0.1:3000;
            expires       1y;
            add_header    Cache-Control "public, immutable";
            access_log    off;
        }
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

